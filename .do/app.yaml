name: keepers-flame
region: nyc
services:
  - name: web
    github:
      repo: peacefulgeek/keepers-flame
      branch: main
      deploy_on_push: true
    build_command: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    run_command: node scripts/start-with-cron.mjs
    http_port: 8080
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /health
    envs:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: AMAZON_TAG
        value: spankyspinola-20
      - key: AUTO_GEN_ENABLED
        value: "true"
      - key: OPENAI_API_KEY
        value: ${OPENAI_API_KEY}
        type: SECRET
      - key: OPENAI_BASE_URL
        value: https://api.deepseek.com
      - key: OPENAI_MODEL
        value: deepseek-v4-pro
      - key: GH_PAT
        value: ${GH_PAT}
        type: SECRET
